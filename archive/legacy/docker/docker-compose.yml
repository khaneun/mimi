services:
  market-pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-pulse-container
    image: market-pulse:latest

    # 환경 변수
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
      - ENABLE_CRON=true  # Set to 'false' to disable cron jobs

    # 볼륨 마운트
    volumes:
      # 데이터 영속성을 위한 볼륨
      - prism-data:/app/market-pulse/data
      - ./reports:/app/market-pulse/reports
      - ./pdf_reports:/app/market-pulse/pdf_reports
      - ./html_reports:/app/market-pulse/html_reports
      - ./charts:/app/market-pulse/charts
      - ./telegram_messages:/app/market-pulse/telegram_messages

      # 설정 파일 (호스트에서 수정 가능)
      - ./.env:/app/market-pulse/.env
      - ./mcp_agent.config.yaml:/app/market-pulse/mcp_agent.config.yaml
      - ./mcp_agent.secrets.yaml:/app/market-pulse/mcp_agent.secrets.yaml

      # 로그 파일
      - ./logs:/app/market-pulse/logs

      # SQLite DB (파일 단위 마운트)
      - ./stock_tracking_db.sqlite:/app/market-pulse/stock_tracking_db.sqlite

      # Crontab 설정 (호스트에서 수정 가능)
      - ./docker/crontab:/app/market-pulse/docker/crontab:ro

    # 작업 디렉토리
    working_dir: /app/market-pulse

    # Entrypoint가 컨테이너를 유지 (cron 서비스 실행)
    # 수동 실행 시: docker-compose run market-pulse python3 script.py

    # 재시작 정책
    restart: unless-stopped

    # 네트워크 모드
    network_mode: bridge

    # 헬스체크
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import sys; sys.exit(0)' && service cron status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 볼륨 정의
volumes:
  prism-data:
    driver: local
